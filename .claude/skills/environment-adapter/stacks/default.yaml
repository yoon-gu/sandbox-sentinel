# 기본 환경 스택 정의 — environment-adapter Skill 이 기본으로 읽는 파일.
#
# 이 스택은 "사내 미러에 일반적으로 등록되어 있다고 가정해도 괜찮은" 최소 공통 집합입니다.
# 실제 운영 환경이 다르면 같은 디렉토리에 새 YAML(예: finance-corp-a.yaml) 을 추가하고,
# 사용자가 해당 환경 스펙을 대화에서 언급하거나 파일로 제공하면 Skill 이 그쪽을 우선 사용합니다.
#
# 기준일: 2026-04-22 (폐쇄망 Python 환경 스펙)

name: default
description: |
  폐쇄망 베이스라인. Python 3.11 / CUDA 12.4 기준이며
  Jupyter 커널, ML 스택(scikit-learn/scipy/sagemaker), LLM 스택(torch + HuggingFace +
  LangChain/LangGraph 계열)을 포함합니다.

python: "3.11"
cuda: "12.4"

allowed_packages:
  # ── 표준 DS 스택 (버전 미고정: 환경에 설치된 버전 사용) ──
  - numpy
  - pandas
  - matplotlib
  - psutil                        # 2026-04-18 추가 (시스템 리소스 모니터링)

  # ── Jupyter / Notebook ──
  - ipykernel
  - ipython

  # ── ML / Data Science ──
  - scikit-learn
  - scipy
  - sagemaker

  # ── LLM / Deep Learning ──
  - torch                         # CUDA 12.4 빌드 (torch==2.4.0+cu124)
  - transformers
  - huggingface-hub

  # ── LangChain / LangGraph 생태계 ──
  - langchain
  - langgraph
  - langgraph-supervisor
  - deepagents

  # ── 템플릿 / 기타 ──
  - jinja2                        # HTML 템플릿 렌더링 (self-contained HTML 생성 시)

  # ── 터미널 UI ──
  # prompt_toolkit 은 ipython 의 필수 전이 의존 — 004 가 이것만 씀 (가장 안전)
  - prompt_toolkit                # ipython 전이 의존 (거의 항상 존재)
  # textual 은 사내 미러에 등록됨 (2026-04-24 확인, 단 pip install --no-deps 필수)
  - textual                       # Rich 기반 풀스크린 TUI 프레임워크 (003 에서 사용)
  - rich                          # textual 전이 의존 + 포맷 출력

# 버전 핀 (2026-04-22 기준 폐쇄망 스펙)
# allowed_packages 에 포함된 패키지 중 사내 미러에 **정확히 이 버전**으로 등록된 항목입니다.
# 변환물 코드를 작성할 때 이 버전과의 호환성을 반드시 확인하세요.
package_versions:
  # Jupyter
  ipykernel: "6.29.5"
  ipython: "8.30.0"

  # ML
  scikit-learn: "1.6.0"
  scipy: "1.14.1"
  sagemaker: "2.237.0"

  # LLM / DL
  torch: "2.4.0+cu124"
  transformers: "4.49.0"
  huggingface-hub: "0.25.5"

  # LangChain / LangGraph
  langchain: "1.2.10"
  langgraph: "1.0.10"
  langgraph-supervisor: "0.0.29"
  deepagents: "0.4.5"

  # 터미널 UI (003)
  # ⚠️ textual 은 사내 미러에 6.11.0 만 등록됨. 설치 시 필수 플래그:
  #       pip install --no-deps textual==6.11.0
  #    (--no-deps 없이 설치하면 의존성 해결이 실패. rich/pygments 등 전이 의존은
  #     사내 미러의 다른 경로로 이미 존재하거나 별도 설치.)
  textual: "6.11.0"

blocked_packages:
  # HTTP 클라이언트 (외부 통신 차단)
  - requests
  - httpx
  - aiohttp
  - urllib3              # 단, 표준 라이브러리 urllib 은 사용 가능
  # 바이너리 영속화
  - pyarrow              # parquet/feather (HTML 영속화 원칙 위배)
  - fastparquet
  - h5py
  - tables               # pytables / HDF5

blocked_persistence_formats:
  # 파일 확장자 단위로 영속화 금지 포맷을 정의
  - .pkl
  - .pickle
  - .db
  - .sqlite
  - .sqlite3
  - .parquet
  - .feather
  - .h5
  - .hdf5
  - .arrow

license_policy:
  allowed_categories:
    - MIT
    - Apache-2.0
    - BSD-2-Clause
    - BSD-3-Clause
    - ISC
    - PSF-2.0
  blocked_categories:
    - GPL-2.0
    - GPL-3.0
    - AGPL-3.0
    - LGPL-3.0          # 정적 링크 시 GPL 전이 우려가 있어 보수적 차단
    - SSPL-1.0
    - BUSL-1.1
  on_unknown: ask        # ask | block | allow
